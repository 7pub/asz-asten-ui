<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASZ Asten Terminal - Büro PC</title>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #e8f5e9;
            --dark: #263238;
            --gray-light: #f5f7f8;
            --border: #cfd8dc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #eceff1;
            color: var(--dark);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            color: var(--primary);
            margin-top: 0;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 10px;
            font-size: 24px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 25px;
            background: var(--gray-light);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 14px;
        }

        input, select {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 16px;
        }

        input:focus {
            outline: 2px solid var(--primary);
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-btn {
            background: white;
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 6px;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background: var(--gray-light);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .table-container {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--gray-light);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tr.selected {
            background-color: var(--primary-light) !important;
            font-weight: bold;
        }

        tr:hover {
            background-color: #f9fbe7;
            cursor: pointer;
        }

        .preview-box {
            background: #fafafa;
            border: 2px dashed #b0bec5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
        }

        .label-output {
            background: white;
            border: 2px solid #000;
            display: inline-block;
            padding: 15px 30px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            text-align: left;
            min-width: 450px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .label-line {
            font-size: 18px;
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-transform: uppercase;
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
        }

        .btn-print {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }

        .btn-print:hover {
            background: #1b5e20;
        }

        .btn-print:disabled {
            background: #b0bec5;
            cursor: not-allowed;
        }

        /* Druckoptimierung für den Etikettendrucker */
        @media print {
            body * {
                visibility: hidden;
            }
            .preview-box, .preview-box * {
                visibility: visible;
            }
            .preview-box {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                border: none;
                padding: 0;
                margin: 0;
            }
            .label-output {
                border: none;
                box-shadow: none;
                padding: 0;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ASZ Asten / St. Florian — Büro-Terminal & Etikettendruck</h1>
    
    <!-- Stammdaten & Caller -->
    <div class="meta-grid">
        <div class="form-group">
            <label>Standort ID</label>
            <input type="text" value="106 Asten/St. Florian" disabled style="background: #e0e0e0;">
        </div>
        <div class="form-group">
            <label>Mitarbeiter / Anlieferer Name (Full Caller Name) *</label>
            <input type="text" id="callerName" placeholder="z. B. Max Mustermann" oninput="updateLabel()">
        </div>
    </div>

    <!-- Kategorie Filter Tabs -->
    <div class="tabs" id="tabContainer">
        <!-- Wird via JS befüllt -->
    </div>

    <!-- Artikelliste / Frachtnummern -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">Frachtnr.</th>
                    <th style="width: 55%;">interne Bezeichnung</th>
                    <th style="width: 30%;">Sammelbehälter-Typ</th>
                </tr>
            </thead>
            <tbody id="materialTableBody">
                <!-- Wird via JS befüllt -->
            </tbody>
        </table>
    </div>

    <!-- Live Etiketten Vorschau -->
    <div class="preview-box">
        <h3 style="margin-top:0; color:#546e7a; font-size:14px;">LIVE-VORSCHAU (2-ZEILIGES BEHÄLTER-ETIKETT)</h3>
        <div class="label-output" id="labelPreview">
            <div class="label-line" id="line1">ASZ 106 ASTEN - [CALLER NAME]</div>
            <div class="label-line" id="line2">[FRACHTNR] [BEZEICHNUNG] ([BEHÄLTER])</div>
        </div>
    </div>

    <!-- Absenden & Drucken -->
    <div class="action-bar">
        <button class="btn-print" id="btnPrint" onclick="printLabel()" disabled>Drucken & an Büro-PC melden</button>
    </div>
</div>

<script>
    // Vollständige LAVU-Datenbasis des ASZ
    const lavuData = [
        { block: "1000", nr: "1501", name: "Großmöbel (ReVital)", container: "Großcontainer" },
        { block: "1000", nr: "1506", name: "Hausrat (ReVital)", container: "Gitterbox gschlossen" },
        { block: "1000", nr: "1510", name: "Elektro-Großgeräte (ReVital)", container: "Palette" },
        { block: "1000", nr: "1511", name: "Elektro-Kleingeräte (ReVital)", container: "Gitterbox" },
        
        { block: "2000", nr: "2110", name: "Altpapier (Zeitungen/Prospekte)", container: "Großcontainer" },
        { block: "2000", nr: "2120", name: "Kartonagen (Wellpappe)", container: "Presscontainer" },
        { block: "2000", nr: "2210", name: "Verpackungsglas Weiß", container: "Glas-Spezialbehälter" },
        { block: "2000", nr: "2220", name: "Verpackungsglas Bunt", container: "Glas-Spezialbehälter" },
        { block: "2000", nr: "2310", name: "Flachglas / Fensterglas", container: "Inloader-Gestell" },
        { block: "2000", nr: "2510", name: "PET-Flaschen transparent", container: "Großsack" },
        { block: "2000", nr: "2511", name: "PET-Flaschen bunt", container: "Großsack" },
        { block: "2000", nr: "2520", name: "Kunststoff-Hohlkörper >5L", container: "Gitterbox" },
        { block: "2000", nr: "2540", name: "PE-Folie transparent (LDPE)", container: "Foliensack" },
        { block: "2000", nr: "2541", name: "PE-Folie bunt / Gewerbe", container: "Foliensack" },
        { block: "2000", nr: "2550", name: "Getränkekartons", container: "LAVU-Sammelsack" },
        { block: "2000", nr: "2570", name: "Styropor (EPS) rein", container: "Großsack" },
        { block: "2000", nr: "2571", name: "Styropor (EPS) Baustelle", container: "Großsack" },
        { block: "2000", nr: "2580", name: "Hartkunststoffe (Nicht-Verp.)", container: "Großcontainer" },
        
        { block: "3000", nr: "3010", name: "Altholz stofflich (Kat. A I/II)", container: "Großcontainer" },
        { block: "3000", nr: "3020", name: "Altholz thermisch (Kat. A III)", container: "Großcontainer" },
        { block: "3000", nr: "3030", name: "Altholz verunreinigt (Kat. A IV)", container: "Sondercontainer" },
        { block: "3000", nr: "3510", name: "Alteisen / Mischschrott", container: "Großcontainer" },
        { block: "3000", nr: "3520", name: "Kabelschrott isoliert", container: "Kleinbox absperrbar" },
        { block: "3000", nr: "3530", name: "Aluminium (Profile/Bleche)", container: "Gitterbox" },
        { block: "3000", nr: "3540", name: "Buntmetalle (Kupfer/Messing)", container: "Kleinbox absperrbar" },
        
        { block: "4000", nr: "4010", name: "Elektro-Großgeräte", container: "Stellplatz lose" },
        { block: "4000", nr: "4020", name: "Kühl- und Klimageräte", container: "Stellplatz gesichert" },
        { block: "4000", nr: "4030", name: "Bildschirmgeräte (TV/Monitore)", container: "Gitterbox/Palette" },
        { block: "4000", nr: "4040", name: "Elektro-Kleingeräte", container: "QR-Box" },
        { block: "4000", nr: "4041", name: "Elektro-Kleingeräte m. Li-Akku", container: "QR-Box Sicherheitsaufst." },
        { block: "4000", nr: "4050", name: "Gasentladungslampen stabform", container: "Spezialbox lang" },
        { block: "4000", nr: "4051", name: "Gasentladungslampen Sonderform", container: "Spezialbox Kiste" },
        { block: "4000", nr: "4110", name: "Gerätebatterien", container: "Fass / Sammelbox" },
        { block: "4000", nr: "4120", name: "Lithium-Batterien intakt", container: "Sicherheitsfass (Sand)" },
        { block: "4000", nr: "4130", name: "Fahrzeugbatterien", container: "Säurestabile Kunststoffbox" },
        
        { block: "4300", nr: "4310", name: "Altöl mineralisch", container: "Doppelwandiger Tank" },
        { block: "4300", nr: "4315", name: "Speiseöl / Altfett", container: "Öli-Palettenbox" },
        { block: "4300", nr: "4320", name: "Dispersionsfarben", container: "Gitterbox Palette" },
        { block: "4300", nr: "4325", name: "Lacke und Lösemittel", container: "Problemstoff-Fass" },
        { block: "4300", nr: "4340", name: "Altmedikamente", container: "Safe-Box Büro" },
        { block: "4300", nr: "4350", name: "Spraydosen mit Restinhalt", container: "Spundfass belüftet" },
        { block: "4300", nr: "4385", name: "Mineralwolle / KMF", container: "ASZ-Sammelsack staubdicht" },
        { block: "4300", nr: "4390", name: "Asbestzement / Eternit", container: "BigBag auf Palette" },
        
        { block: "9000", nr: "9110", name: "Bauschutt rein (mineralisch)", container: "Flachcontainer" },
        { block: "9000", nr: "9120", name: "Bauschutt sortiert / Ytong", container: "Großcontainer" },
        { block: "9000", nr: "9140", name: "Gipskartonplatten rein", container: "Großcontainer gedeckt" },
        { block: "9000", nr: "9510", name: "Sperrmüll", container: "Großvolumen-Presscontainer" },
        { block: "9000", nr: "9520", name: "Altreifen ohne Felge", container: "Gitterbox XL" },
        { block: "9000", nr: "9521", name: "Altreifen mit Felge", container: "Gitterbox XL" }
    ];

    const blocks = [
        { id: "all", name: "ALLE ANZEIGEN" },
        { id: "1000", name: "1000: ReVital" },
        { id: "2000", name: "2000: Altstoffe / Verp." },
        { id: "3000", name: "3000: Holz & Metall" },
        { id: "4000", name: "4000: Elektro & Akku" },
        { id: "4300", name: "4300: Problemstoffe" },
        { id: "9000", name: "9000: Bau & Sperrmüll" }
    ];

    let selectedRowData = null;
    let currentBlockFilter = "all";

    // Register UI & Tabs initialisieren
    function init() {
        const tabContainer = document.getElementById("tabContainer");
        blocks.forEach((b, index) => {
            const btn = document.createElement("button");
            btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
            btn.innerText = b.name;
            btn.onclick = () => filterBlock(b.id, btn);
            tabContainer.appendChild(btn);
        });
        renderTable();
    }

    // Tabelle basierend auf Filter rendern
    function renderTable() {
        const tbody = document.getElementById("materialTableBody");
        tbody.innerHTML = "";

        const filtered = currentBlockFilter === "all" 
            ? lavuData 
            : lavuData.filter(item => item.block === currentBlockFilter);

        filtered.forEach(item => {
            const tr = document.createElement("tr");
            if (selectedRowData && selectedRowData.nr === item.nr) {
                tr.className = "selected";
            }
            
            tr.innerHTML = `
                <td><strong>${item.nr}</strong></td>
                <td>${item.name}</td>
                <td><span style="color:#546e7a; font-size:14px;">${item.container}</span></td>
            `;
            
            tr.onclick = () => selectMaterial(item, tr);
            tbody.appendChild(tr);
        });
    }

    function filterBlock(blockId, element) {
        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
        element.classList.add("active");
        currentBlockFilter = blockId;
        renderTable();
    }

    function selectMaterial(item, element) {
        document.querySelectorAll("#materialTableBody tr").forEach(tr => tr.classList.remove("selected"));
        element.classList.add("selected");
        selectedRowData = item;
        updateLabel();
    }

    // Label Live-Aktualisierung
    function updateLabel() {
        const callerName = document.getElementById("callerName").value.trim();
        const line1 = document.getElementById("line1");
        const line2 = document.getElementById("line2");
        const btnPrint = document.getElementById("btnPrint");

        // Zeile 1 zusammensetzen
        if (callerName) {
            line1.innerText = `ASZ 106 ASTEN - ${callerName}`;
        } else {
            line1.innerText = "ASZ 106 ASTEN - [CALLER NAME]";
        }

        // Zeile 2 zusammensetzen
        if (selectedRowData) {
            line2.innerText = `${selectedRowData.nr} ${selectedRowData.name} (${selectedRowData.container})`;
        } else {
            line2.innerText = "[FRACHTNR] [BEZEICHNUNG] ([BEHÄLTER])";
        }

        // Freigabe des Druckknopfes prüfen
        if (callerName && selectedRowData) {
            btnPrint.disabled = false;
        } else {
            btnPrint.disabled = true;
        }
    }

    // Druckbefehl absetzen und Datentransfer simulieren
    function printLabel() {
        const callerName = document.getElementById("callerName").value.trim();
        
        console.log("=== ÜBERTRAGUNG AN ASZ-BÜRO-DATENBANK ===");
        console.log(`Standort: 106 Asten, Bearbeiter: ${callerName}`);
        console.log(`Verbuche Frachtnummer: ${selectedRowData.nr} (${selectedRowData.name})`);
        
        // Nutzt nativen Druckertreiber des Windows/Büro-PCs
        window.print();
    }

    // App starten
    window.onload = init;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASZ Asten - Frachtliste</title>
  <style>
    /* --- Basisstile, angelehnt an das Terminal-Design --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background-color: #0a0e14;
      color: #b3bcc8;
      padding: 20px;
      line-height: 1.6;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background-color: #141a20;
      padding: 25px;
      border-radius: 12px;
      border: 1px solid #2a3a4a;
      box-shadow: 0 0 20px rgba(0, 150, 255, 0.1);
    }

    /* --- Kopfbereich --- */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 2px solid #2a4a5a;
      padding-bottom: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .header h1 {
      color: #7fc1d9;
      font-weight: normal;
      letter-spacing: 2px;
      font-size: 1.8rem;
    }

    .header .status {
      color: #7fc1d9;
      background-color: #1a2a32;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.9rem;
      border: 1px solid #3a5a6a;
    }

    .header .status span {
      color: #6fcf97;
      font-weight: bold;
    }

    /* --- Ansichtsumschalter (wie auf der ersten Seite) --- */
    .view-toggle {
      text-align: right;
      margin-bottom: 20px;
    }

    .view-toggle button {
      background-color: #1a2a32;
      border: 1px solid #3a5a6a;
      color: #b3bcc8;
      padding: 6px 16px;
      border-radius: 16px;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .view-toggle button:hover {
      background-color: #2a4a5a;
      color: #ffffff;
      border-color: #6a9aaa;
    }

    /* --- Materialliste als Raster --- */
    .material-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 8px 20px;
      margin: 20px 0 30px 0;
    }

    .material-item {
      display: flex;
      gap: 12px;
      padding: 4px 0;
      border-bottom: 1px dotted #1a2a32;
      font-size: 0.9rem;
    }

    .material-item .code {
      color: #6a8a9a;
      min-width: 45px;
      font-weight: bold;
    }

    .material-item .name {
      color: #d0d8e0;
      flex: 1;
    }

    .material-item .container {
      color: #8a9aaa;
      background-color: #0e141a;
      padding: 0 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      white-space: nowrap;
      border: 1px solid #1a2a32;
    }

    /* --- Bereich für die Frachtliste (wie im Original) --- */
    .fracht-section {
      margin-top: 30px;
      border-top: 2px solid #2a4a5a;
      padding-top: 20px;
    }

    .fracht-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .fracht-header h2 {
      color: #7fc1d9;
      font-weight: normal;
      font-size: 1.3rem;
      letter-spacing: 1px;
    }

    .fracht-header .count {
      color: #6a8a9a;
      background: #0e141a;
      padding: 2px 12px;
      border-radius: 12px;
      border: 1px solid #1a2a32;
    }

    .fracht-placeholder {
      color: #5a6a7a;
      text-align: center;
      padding: 30px 0;
      border: 1px dashed #1a2a32;
      border-radius: 8px;
      margin: 10px 0;
    }

    .fracht-placeholder span {
      display: inline-block;
      background: #0e141a;
      padding: 4px 16px;
      border-radius: 12px;
      margin-top: 8px;
      color: #6a8a9a;
    }

    .add-button {
      background-color: #1a2a32;
      border: 1px solid #3a6a4a;
      color: #6fcf97;
      padding: 8px 24px;
      border-radius: 20px;
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }

    .add-button:hover {
      background-color: #1a3a2a;
      border-color: #6fcf97;
      color: #ffffff;
    }

    /* --- Responsive Anpassungen --- */
    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        align-items: start;
        gap: 10px;
      }
      .material-grid {
        grid-template-columns: 1fr;
      }
      .material-item {
        flex-wrap: wrap;
      }
      .material-item .container {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Kopfbereich mit Titel und Status -->
    <div class="header">
      <h1>📋 ASZ Asten</h1>
      <div class="status">📍 Standort 106 · <span>Terminal aktiv</span></div>
    </div>

    <!-- Ansichtsumschalter (wie von der ersten Seite gewohnt) -->
    <div class="view-toggle">
      <button onclick="alert('Zurück zur Platz-Terminal-Ansicht')">⬅ Ansicht wechseln (Platz-Terminal)</button>
    </div>

    <!-- Materialliste -->
    <div style="margin-bottom: 5px; color: #6a8a9a; font-size: 0.9rem; letter-spacing: 1px;">
      ⚙️ Materialien & Behälter
    </div>
    <div class="material-grid" id="materialList">
      <!-- Die Liste wird per JavaScript aus den Daten generiert -->
    </div>

    <!-- Frachtliste - Entsorgung (wie im Original) -->
    <div class="fracht-section">
      <div class="fracht-header">
        <h2>🚛 Frachtliste - Entsorgung</h2>
        <span class="count">0 Frachtnummern</span>
      </div>

      <div class="fracht-placeholder">
        <div style="margin-bottom: 8px;">📭 Keine Frachtnummern</div>
        <div style="font-size: 0.85rem;">Keine Karteikärtchen</div>
        <span>➕ Füge Materialien hinzu</span>
      </div>

      <button class="add-button" onclick="alert('Material zur Frachtliste hinzufügen')">➕ Material hinzufügen</button>
    </div>
  </div>

  <script>
    // --- Die vollständige Materialliste von der Seite ---
    const materialData = [
      { code: "1501", name: "Großmöbel (ReVital)", container: "Container 10m³" },
      { code: "1506", name: "Hausrat (ReVital)", container: "Container 10m³" },
      { code: "1510", name: "Elektro-Großgeräte Wiederverwendung", container: "Gitterbox" },
      { code: "1511", name: "Elektro-Kleingeräte Wiederverwendung", container: "QR-Box" },
      { code: "2110", name: "Altpapier (Zeitungen, Illustrierte)", container: "Papier-Container" },
      { code: "2120", name: "Kartonagen (Wellpappe)", container: "Container 10m³" },
      { code: "2210", name: "Verpackungsglas Weiß", container: "Glas-Container" },
      { code: "2220", name: "Verpackungsglas Bunt", container: "Glas-Container" },
      { code: "2310", name: "Flachglas / Fensterglas", container: "Container 5m³" },
      { code: "2510", name: "PET-Flaschen transparent", container: "Sack / BigBag" },
      { code: "2511", name: "PET-Flaschen bunt", container: "Sack / BigBag" },
      { code: "2520", name: "Kunststoff-Hohlkörper (>5L)", container: "Gitterbox" },
      { code: "2540", name: "PE-Folie transparent (LDPE)", container: "Sack" },
      { code: "2541", name: "PE-Folie bunt / Gewerbefolie", container: "Sack" },
      { code: "2550", name: "Getränkekartons", container: "Container 10m³" },
      { code: "2570", name: "Styropor (EPS) rein", container: "Sack" },
      { code: "2571", name: "Styropor (EPS) Baustelle", container: "Container" },
      { code: "2580", name: "Hartkunststoffe (Spielzeug, Möbel)", container: "Container 10m³" },
      { code: "3010", name: "Altholz stofflich (A I / A II)", container: "Container 10m³" },
      { code: "3020", name: "Altholz thermisch (A III)", container: "Container 10m³" },
      { code: "3030", name: "Altholz verunreinigt / imprägniert", container: "Container 10m³" },
      { code: "3510", name: "Alteisen / Mischschrott", container: "Container 5m³" },
      { code: "3520", name: "Kabelschrott (Cu/Al isoliert)", container: "Container" },
      { code: "3530", name: "Aluminium (Profile, Bleche)", container: "Container" },
      { code: "3540", name: "Buntmetalle (Cu, Messing)", container: "Container" },
      { code: "4010", name: "Elektro-Großgeräte", container: "Container 10m³" },
      { code: "4020", name: "Kühl- und Klimageräte", container: "Container" },
      { code: "4030", name: "Bildschirmgeräte (TV, Monitore)", container: "Container" },
      { code: "4040", name: "Elektro-Kleingeräte (ohne Akku)", container: "QR-Box" },
      { code: "4041", name: "Kleingeräte mit Li-Akku", container: "Sonderbox" },
      { code: "4050", name: "Gasentladungslampen stabförmig", container: "Sammelbox" },
      { code: "4051", name: "Gasentladungslampen Sonderformen", container: "Sammelbox" },
      { code: "4110", name: "Gerätebatterien (Fass / Box)", container: "Batterie-Fass" },
      { code: "4120", name: "Lithium-Batterien / Akkus", container: "Sonderbox" },
      { code: "4130", name: "Fahrzeugbatterien", container: "Batterie-Container" },
      { code: "4310", name: "Altöl mineralisch", container: "Kanister / Fass" },
      { code: "4315", name: "Speiseöl / Altfett", container: "Kanister" },
      { code: "4320", name: "Dispersionsfarben (Wasserbasis)", container: "Gebinde" },
      { code: "4325", name: "Lacke und Lösemittel", container: "Gebinde" },
      { code: "4340", name: "Altmedikamente", container: "Sammelbox" },
      { code: "4350", name: "Spraydosen mit Restinhalt", container: "Sonderbox" },
      { code: "4385", name: "Mineralwolle / KMF (Sack)", container: "ASZ-Sack" },
      { code: "4390", name: "Asbestzement / Eternit mix", container: "BigBag" },
      { code: "4963", name: "kostenpfl. Mineralwolle (Sack)", container: "ASZ-Sack" },
      { code: "9110", name: "Bauschutt rein (Ziegel, Beton)", container: "Container 10m³" },
      { code: "9120", name: "Bauschutt sortiert / Ytong", container: "Container 10m³" },
      { code: "9140", name: "Gipskartonplatten rein", container: "Container 10m³" },
      { code: "9510", name: "Sperrmüll", container: "Container 10m³" },
      { code: "9520", name: "Altreifen ohne Felge", container: "Reifen-Container" },
      { code: "9521", name: "Altreifen mit Felge", container: "Reifen-Container" }
    ];

    // --- Funktion zum Rendern der Materialliste ---
    function renderMaterialList() {
      const listContainer = document.getElementById('materialList');
      if (!listContainer) return;

      // Sortieren nach Code für bessere Übersicht
      const sortedData = [...materialData].sort((a, b) => a.code.localeCompare(b.code));

      let html = '';
      sortedData.forEach(item => {
        html += `
          <div class="material-item">
            <span class="code">${item.code}</span>
            <span class="name">${item.name}</span>
            <span class="container">${item.container}</span>
          </div>
        `;
      });

      listContainer.innerHTML = html;
    }

    // --- Seite initialisieren ---
    document.addEventListener('DOMContentLoaded', renderMaterialList);
  </script>
</body>
</html>
